name: KOSIS 지수 갱신

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 5 * *"
  push:
    branches: [main]
    paths: ["fetch_kosis.py"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: KOSIS 자료 수집
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          START_YEAR: "2010"
        run: python fetch_kosis.py

      - name: 변경분 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indices.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: KOSIS 지수 자동 갱신 ($(date +%Y-%m-%d))"
            git push
          fi
